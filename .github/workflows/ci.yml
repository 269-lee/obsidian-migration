name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install lint dependencies
        run: pip install black flake8

      - name: Check formatting (black)
        run: black --check --diff .

      - name: Lint (flake8)
        run: flake8 . --max-line-length=120 --exclude=venv,__pycache__,migration_output,migration_output_v2

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt pytest-cov

      - name: Run tests with coverage
        env:
          ANTHROPIC_API_KEY: test-key
          NOTION_CLIENT_SECRET: test-key
          SLACK_CLIENT_SECRET: test-key
        run: |
          pytest tests/ \
            --cov=. \
            --cov-exclude=venv \
            --cov-exclude=migration_output \
            --cov-exclude=migration_output_v2 \
            --cov-fail-under=60 \
            -v

  frontend-lint:
    name: Frontend Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install ESLint if missing
        run: |
          if ! npm list eslint --depth=0 2>/dev/null | grep -q eslint; then
            npm install --save-dev eslint @typescript-eslint/parser @typescript-eslint/eslint-plugin
          fi

      - name: Type check
        run: npx tsc --noEmit

      - name: Build check
        run: npm run build
